# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint-fix:
      glob: "*.{js,ts,vue}"
      run: pnpm eslint --fix {staged_files}
      stage_fixed: true
    textlint:
      glob: "content/**/*.md"
      run: pnpm textlint {staged_files}
      
commit-msg:
  commands:
    check-emoji:
      run: |
        # コミットメッセージが絵文字で始まっているかチェック
        if ! grep -qE '^[✨🎨📝🐛♻️🔧➕➖🚚🔥⚡🔒🚧✅]' "{1}"; then
          echo "エラー: コミットメッセージは絵文字で始める必要があります"
          echo "例: ✨ 新機能の追加"
          exit 1
        fi
